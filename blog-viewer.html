<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Article</title>

    <!-- GitHub Markdown style for article look -->
    <link
      href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown-light.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f9f9f9;
        font-family: 'Inter', sans-serif;
        padding: 2rem;
        display: flex;
        justify-content: center;
      }

      .markdown-body {
        max-width: 800px;
        width: 100%;
        background: #fff;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      }

      h1, h2, h3, h4 {
        color: #222;
      }

      img {
        max-width: 100%;
        border-radius: 8px;
        margin: 1rem 0;
      }

      pre {
        background: #f6f8fa;
        padding: 1rem;
        overflow-x: auto;
        border-radius: 6px;
      }

      blockquote {
        border-left: 4px solid #ccc;
        padding-left: 1rem;
        color: #555;
        margin: 1rem 0;
      }

      a {
        color: #0366d6;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <article class="markdown-body" id="blogContent"></article>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      // Get the Markdown file from query string or default
      const urlParams = new URLSearchParams(window.location.search);
      const file = urlParams.get('file') || 'blog/converting-lat-lng.md';

      fetch(file)
        .then(res => res.text())
        .then(text => {
          document.getElementById('blogContent').innerHTML = marked.parse(text);
        })
        .catch(err => console.error('Error loading Markdown:', err));
    </script>
  </body>
</html>
